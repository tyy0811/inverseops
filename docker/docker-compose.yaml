services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - INVERSEOPS_CACHE=/app/.cache/inverseops
    volumes:
      # Mount checkpoints if available locally
      - ../outputs:/app/outputs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

seed: 42
task: denoise

data:
  train_root: data/raw/fmd/fmd/Confocal_FISH
  val_root: data/raw/fmd/fmd/Confocal_FISH
  noise_source: real
  batch_size: 4
  num_workers: 2
  patch_size: 128

model:
  name: swinir
  pretrained: true
  noise_level: 25

training:
  epochs: 100
  learning_rate: 2.0e-4
  weight_decay: 0.0
  loss: l1
  amp: true
  early_stopping_patience: 10
  log_every_n_steps: 100

scheduler:
  name: cosine
  t_max: 100
  min_lr: 1.0e-6

output_dir: outputs/training_realnoise

tracking:
  wandb_project: inverseops
  enabled: true
  run_name: swinir_denoise_realnoise
  tags: ["denoising", "swinir", "real"]

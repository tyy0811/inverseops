seed: 42
task: denoise

data:
  train_root: data/raw/fmd
  val_root: data/raw/fmd
  noise_source: synthetic
  batch_size: 4
  num_workers: 2
  patch_size: 128
  sigmas: [25]

model:
  name: nafnet
  pretrained: true
  width: 32

training:
  epochs: 100
  learning_rate: 2.0e-4
  weight_decay: 0.0
  loss: l1
  amp: true
  early_stopping_patience: 10
  log_every_n_steps: 100

scheduler:
  name: cosine
  t_max: 100
  min_lr: 1.0e-6

output_dir: outputs/training_nafnet_sigma25

tracking:
  wandb_project: inverseops
  enabled: true
  run_name: nafnet_denoise_sigma25
  tags: ["denoising", "nafnet", "synthetic"]
